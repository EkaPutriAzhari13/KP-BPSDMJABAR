<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halo, Rekan ASN!</title>
<style>
  :root{
    --teal: #167a5c;
    --teal-dark: #0b6a4f;
    --text-dark: #1c1e22;
    --text-muted: #6b7280;
    --border-color: #e2e4e8;
    --input-bg: #f5f6f8;
    --placeholder: #9aa0a8;
  }

  * { box-sizing: border-box; }

  html, body{
    height: 100%;
  }

  body{
    margin:0;
    font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
    background: #ffffff;
    min-height:100vh;
    width: 100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 40px 16px;
  }

  .card{
    width: 100%;
    max-width: 460px;
    padding: 20px 4px;
  }

  .title{
    text-align:center;
    color: var(--text-dark);
    font-size: 26px;
    font-weight: 700;
    margin: 0 0 10px;
  }

  .subtitle{
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.5;
    margin: 0 0 26px;
  }

  .field{
    margin-bottom: 18px;
  }

  .field-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom: 8px;
  }

  label{
    font-size: 14px;
    color: var(--text-dark);
    font-weight: 500;
  }

  .forgot{
    font-size: 14px;
    color: var(--teal);
    font-weight: 600;
    text-decoration: none;
    transition: color 0.2s ease, text-decoration-color 0.2s ease;
  }

  .forgot:hover{
    color: var(--teal-dark);
    text-decoration: underline;
  }

  .input-wrap{
    position: relative;
    display:flex;
    align-items:center;
  }

  .input-wrap .icon{
    position:absolute;
    left: 14px;
    display:flex;
    align-items:center;
    color: var(--placeholder);
  }

  .input-wrap .icon.right{
    left: auto;
    right: 14px;
    cursor: pointer;
    transition: color 0.2s ease;
  }

  .input-wrap .icon.right:hover{
    color: var(--teal);
  }

  input[type="text"],
  input[type="password"]{
    width: 100%;
    padding: 13px 44px;
    border: 1px solid var(--border-color);
    border-radius: 10px;
    font-size: 15px;
    color: var(--text-dark);
    background: var(--input-bg);
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  }

  input::placeholder{
    color: var(--placeholder);
  }

  input:hover{
    border-color: #b9bec6;
  }

  input:focus{
    border-color: var(--teal);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(22, 122, 92, 0.15);
  }

  .btn-primary{
    width:100%;
    background: var(--teal-dark);
    color:#fff;
    border:none;
    border-radius: 10px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    cursor:pointer;
    margin-top: 8px;
    margin-bottom: 22px;
    transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
  }

  .btn-primary svg{
    transition: transform 0.2s ease;
  }

  .btn-primary:hover{
    background: #0a5c44;
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(11, 106, 79, 0.35);
  }

  .btn-primary:hover svg{
    transform: translateX(3px);
  }

  .btn-primary:active{
    transform: translateY(0);
    box-shadow: none;
  }

  .divider{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom: 22px;
  }

  .divider::before,
  .divider::after{
    content:"";
    flex:1;
    height:1px;
    background: var(--border-color);
  }

  .divider span{
    font-size: 12px;
    letter-spacing: 0.03em;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .btn-google{
    width:100%;
    background: #f7f9fc;
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 13px;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-dark);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    cursor:pointer;
    margin-bottom: 24px;
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
  }

  .btn-google:hover{
    background: #eef1f7;
    border-color: #c7cbd1;
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.08);
  }

  .btn-google:active{
    transform: translateY(0);
    box-shadow: none;
  }

  .back-link{
    display:block;
    text-align:center;
    color: var(--text-dark);
    text-decoration:none;
    font-size: 15px;
    transition: color 0.2s ease;
  }

  .back-link:hover{
    color: var(--teal);
  }
</style>
</head>
<body>

  <div class="card">
    <h1 class="title">Halo, Rekan ASN!</h1>
    <p class="subtitle">Selamat datang di platform integrasi pembelajaran kami.</p>

    <div class="field">
      <div class="field-row">
        <label for="userid">Email / NIP / NIK</label>
      </div>
      <div class="input-wrap">
        <span class="icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm0 2c-4.42 0-8 2.24-8 5v1a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-1c0-2.76-3.58-5-8-5Z" fill="currentColor"/>
          </svg>
        </span>
        <input type="text" id="userid" placeholder="Masukkan ID Anda">
      </div>
    </div>

    <div class="field">
      <div class="field-row">
        <label for="password">Sandi</label>
        <a href="#" class="forgot">Lupa sandi?</a>
      </div>
      <div class="input-wrap">
        <span class="icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 10V8a6 6 0 1 1 12 0v2h.5A1.5 1.5 0 0 1 20 11.5v8A1.5 1.5 0 0 1 18.5 21h-13A1.5 1.5 0 0 1 4 19.5v-8A1.5 1.5 0 0 1 5.5 10H6Zm2 0h8V8a4 4 0 1 0-8 0v2Z" fill="currentColor"/>
          </svg>
        </span>
        <input type="password" id="password" placeholder="Masukkan kata sandi">
        <span class="icon right" id="togglePw">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 5c-5.5 0-9.5 4.5-10 7 0.5 2.5 4.5 7 10 7s9.5-4.5 10-7c-0.5-2.5-4.5-7-10-7Zm0 11.5A4.5 4.5 0 1 1 12 7.5a4.5 4.5 0 0 1 0 9Zm0-2.5a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z" fill="currentColor"/>
          </svg>
        </span>
      </div>
    </div>

    <button class="btn-primary" type="button">
      Masuk Sekarang
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 5l7 7-7 7M20 12H4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <div class="divider"><span>ATAU MASUK DENGAN</span></div>

    <button class="btn-google" type="button">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.3 6.1 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.4-.4-3.5z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34.3 6.1 29.4 4 24 4c-7.5 0-14 4.2-17.3 10.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.3C29.3 35.4 26.8 36 24 36c-5.3 0-9.7-3.1-11.3-7.9l-6.5 5C9.9 39.7 16.4 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.3 5.3C40.9 36.4 44 30.8 44 24c0-1.2-.1-2.4-.4-3.5z"/>
      </svg>
      Masuk dengan Google
    </button>

    <a href="pilih-login.html" class="back-link">Kembali ke Halaman Utama</a>
  </div>

  <script>
    const toggle = document.getElementById('togglePw');
    const pwInput = document.getElementById('password');
    toggle.addEventListener('click', () => {
      pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
    });
  </script>

</body>
</html>
