<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk Akun - Tenaga Kontrak - Jabar CorpU Talent</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-heading { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-b from-[#f9f9ff] to-white min-h-screen flex flex-col items-center justify-center p-4">

  <!-- Compact card -->
  <div class="w-full max-w-[420px] bg-white border border-[#bcc9c4]/30 rounded-2xl shadow-[0_20px_25px_-5px_rgba(0,104,87,0.05),0_8px_10px_-6px_rgba(0,104,87,0.05)] overflow-hidden">

    <!-- Focused header -->
    <div class="flex flex-col items-center pt-6 px-6">
      <div class="w-20 h-20 rounded-full bg-[#e7eeff] flex items-center justify-center mb-3">
        <svg class="w-10 h-10" viewBox="0 0 24 24" fill="none" stroke="#006857" stroke-width="1.5"><circle cx="12" cy="8" r="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h1 class="font-heading text-base text-[#006857] mb-2">Masuk Akun</h1>
      <span class="inline-flex items-center gap-1.5 text-sm text-[#006b5e] bg-[#85f3df]/20 border border-[#85f3df]/50 rounded-xl px-3 py-1 mb-2">
        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Tenaga Kontrak
      </span>
      <p class="text-base text-[#3d4945] text-center pb-6">Anda masuk sebagai Tenaga Kontrak</p>
    </div>

    <!-- Login section -->
    <div class="flex flex-col gap-6 p-6">
      <form class="flex flex-col gap-4 w-full">

        <div class="flex flex-col gap-[6px] w-full">
          <label for="identitas" class="text-base text-[#3d4945]">Email / NIP / NIK</label>
          <div class="relative w-full">
            <span class="absolute left-[14px] top-1/2 -translate-y-1/2 text-[#6d7a75]">
              <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="7" r="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <input
              id="identitas"
              type="text"
              placeholder="Masukkan ID anda"
              class="w-full bg-[#f9f9ff] border border-[#bcc9c4]/60 rounded-lg pl-[45px] pr-[17px] py-[15px] text-base text-[#111c2c] placeholder:text-[#6d7a75]/50 outline-none focus:border-[#006857] focus:ring-2 focus:ring-[#006857]/20"
            />
          </div>
        </div>

        <div class="flex flex-col gap-[6px] w-full pb-2">
          <div class="flex items-center justify-between">
            <label for="password" class="text-base text-[#3d4945]">Kata Sandi</label>
            <a href="#" class="text-base text-[#006857] hover:underline">Lupa?</a>
          </div>
          <div class="relative w-full">
            <span class="absolute left-[14px] top-1/2 -translate-y-1/2 text-[#6d7a75]">
              <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="10" rx="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <input
              id="password"
              type="password"
              placeholder="••••••••"
              class="w-full bg-[#f9f9ff] border border-[#bcc9c4]/60 rounded-lg pl-[45px] pr-[45px] py-[15px] text-base text-[#111c2c] placeholder:text-[#6d7a75]/50 outline-none focus:border-[#006857] focus:ring-2 focus:ring-[#006857]/20"
            />
            <button type="button" aria-label="Tampilkan kata sandi" class="absolute right-[14px] top-1/2 -translate-y-1/2 text-[#6d7a75]">
              <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="flex items-center justify-center gap-2 w-full py-[14px] rounded-lg bg-[#006857] text-white text-base shadow-[0_10px_15px_-3px_rgba(0,104,87,0.2),0_4px_6px_-4px_rgba(0,104,87,0.2)] hover:bg-[#00543f] transition-colors">
          Masuk Sekarang
          <svg class="w-[13.5px] h-[13.5px]" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

        <div class="flex items-center w-full py-2">
          <span class="h-px flex-1 bg-[#bcc9c4]/30"></span>
          <span class="px-4 text-base text-[#6d7a75]">atau</span>
          <span class="h-px flex-1 bg-[#bcc9c4]/30"></span>
        </div>

        <button type="button" class="flex items-center justify-center gap-3 w-full py-[13px] rounded-lg border border-[#bcc9c4]/60 hover:bg-gray-50 transition-colors">
          <svg class="w-5 h-5" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.9 32.9 29.4 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5Z"/>
            <path fill="#FF3D00" d="m6.3 14.7 6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7Z"/>
            <path fill="#4CAF50" d="M24 44c5.4 0 10.3-2.1 14-5.5l-6.5-5.4C29.5 34.9 26.9 36 24 36c-5.4 0-9.9-3.1-11.3-7.4l-6.5 5C9.6 39.6 16.2 44 24 44Z"/>
            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.7 2-2 3.7-3.7 4.9l6.5 5.4C39.9 36.7 44 31 44 24c0-1.3-.1-2.7-.4-3.5Z"/>
          </svg>
          <span class="text-base text-[#111c2c]">Masuk dengan Google</span>
        </button>
      </form>

      <p class="text-base text-center text-[#3d4945]">
        Belum punya akun? <span class="font-semibold text-[#006857]">Daftar</span>
      </p>
    </div>
  </div>

  <!-- Footer -->
  <p class="text-base text-[#3d4945] opacity-70 text-center pt-8">© 2024 Jabar CorpU Talent.</p>

</body>
</html>
