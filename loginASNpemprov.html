<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login ASN Pemprov Jabar - Jabar CorpU Talent</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-heading { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-b from-white to-[#f9f9ff] min-h-screen">

  <main class="flex flex-col items-center justify-center px-4 py-12">
    <div class="flex flex-col items-center gap-2 pb-10">
      <h1 class="font-heading font-bold text-2xl text-[#006857] text-center">Jabar CorpU Talent</h1>
      <p class="text-sm font-medium text-[#3d4945] text-center">Sistem Pembelajaran Aparatur</p>
    </div>
    <div class="flex flex-col gap-8 w-full max-w-[448px]">
      <div class="flex flex-col items-center">
        <div class="flex items-center justify-center w-24 h-24 rounded-lg bg-white border border-[#bcc9c4]/30 shadow-sm mb-4">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M17 20h5v-2a4 4 0 0 0-3-3.87M9 20H4v-2a4 4 0 0 1 3-3.87m6-3.13a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm6 0a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm-12 0a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="#006857" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2 class="font-heading font-semibold text-2xl text-[#111c2c] tracking-[2.4px] uppercase">Jabar CorpU</h2>
        <p class="text-sm font-medium text-[#006b5e] tracking-[1.4px] opacity-75">Talent</p>
      </div>
      <div class="flex flex-col gap-2 items-center text-center">
        <h3 class="font-heading font-semibold text-2xl text-[#111c2c]">Selamat Datang</h3>
        <p class="text-base text-[#3d4945]">
          Silakan masuk sebagai ASN Pemprov Jabar<br />untuk melanjutkan.
        </p>
      </div>
      <form class="flex flex-col gap-6 w-full">
        <div class="flex flex-col gap-1 w-full">
          <label for="identitas" class="text-sm font-medium text-[#3d4945] px-1">Email / NIP / NIK</label>
          <div class="relative w-full">
            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-[#6d7a75]">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="7" r="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <input
              id="identitas"
              type="text"
              placeholder="Masukkan ID Anda"
              class="w-full bg-[#f9f9ff] border border-[#bcc9c4] rounded-lg pl-[49px] pr-[17px] py-[17px] text-base text-[#111c2c] placeholder:text-[#6d7a75]/50 outline-none focus:border-[#006857] focus:ring-2 focus:ring-[#006857]/20"
            />
          </div>
        </div>
        <div class="flex flex-col gap-2 w-full">
          <div class="flex items-end justify-between px-1">
            <label for="password" class="text-sm font-medium text-[#3d4945]">Sandi</label>
            <a href="#" class="text-xs font-semibold tracking-[0.6px] text-[#006857] hover:underline">Lupa sandi?</a>
          </div>
          <div class="relative w-full">
            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-[#6d7a75]">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="10" rx="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <input
              id="password"
              type="password"
              placeholder="Masukkan kata sandi"
              class="w-full bg-[#f9f9ff] border border-[#bcc9c4] rounded-lg pl-[49px] pr-[49px] py-[17px] text-base text-[#111c2c] placeholder:text-[#6d7a75]/50 outline-none focus:border-[#006857] focus:ring-2 focus:ring-[#006857]/20"
            />
            <button type="button" aria-label="Tampilkan kata sandi" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#6d7a75]">
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="flex items-center justify-center gap-2 w-full py-4 rounded-lg bg-[#006857] text-white text-sm font-medium hover:bg-[#00543f] transition-colors">
          Masuk sebagai ASN Pemprov
          <svg class="w-[15px] h-[15px]" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="flex items-center w-full">
          <span class="h-px flex-1 bg-[#bcc9c4]"></span>
          <span class="px-4 text-xs font-semibold tracking-[1.2px] uppercase text-[#6d7a75]">Atau</span>
          <span class="h-px flex-1 bg-[#bcc9c4]"></span>
        </div>
        <div class="flex flex-col gap-3 w-full">
          <button type="button" class="flex items-center justify-center gap-3 w-full py-[13px] rounded-lg bg-[#f0f3ff] border border-[#bcc9c4] hover:bg-[#e7eeff] transition-colors">
            <svg class="w-5 h-5" viewBox="0 0 48 48">
              <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.9 32.9 29.4 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5Z"/>
              <path fill="#FF3D00" d="m6.3 14.7 6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7Z"/>
              <path fill="#4CAF50" d="M24 44c5.4 0 10.3-2.1 14-5.5l-6.5-5.4C29.5 34.9 26.9 36 24 36c-5.4 0-9.9-3.1-11.3-7.4l-6.5 5C9.6 39.6 16.2 44 24 44Z"/>
              <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.7 2-2 3.7-3.7 4.9l6.5 5.4C39.9 36.7 44 31 44 24c0-1.3-.1-2.7-.4-3.5Z"/>
            </svg>
            <span class="text-sm font-medium text-[#111c2c]">Masuk dengan Google</span>
          </button>
          <a href="pilih-jenis-login.html" class="flex items-center justify-center gap-2 w-full py-3 rounded-lg text-sm font-medium text-[#3d4945] hover:text-[#006857] transition-colors">
            <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Kembali
          </a>
        </div>
      </form>
      <p class="text-base text-center text-[#3d4945]">
        Kesulitan mengakses akun? <span class="text-[#006857]">Hubungi Bantuan</span>
      </p>
    </div>
    <div class="pt-16 px-4">
      <p class="text-xs font-semibold tracking-[0.6px] text-center text-[#6d7a75]">
        © 2024 Jabar CorpU Talent. Hak Cipta Dilindungi Undang-Undang.
      </p>
    </div>
  </main>

</body>
</html>
